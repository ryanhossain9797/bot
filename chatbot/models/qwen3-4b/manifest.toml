model    = "Qwen3-4B-Q6_K.gguf"
template = "chat_template.jinja"

[sampling]
top_k = 20
top_p = 0.8

[context]
n_ctx = 32768
n_batch = 2048
batch_chunk = 512
max_generation_tokens = 2048

[format]
enable_thinking       = false
add_generation_prompt = true
parser                = "qwen"

[thinking]
close_marker = "</think>"
